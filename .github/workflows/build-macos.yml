name: Build VocalOne macOS Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Clone JUCE
        run: git clone --depth=1 https://github.com/juce-framework/JUCE.git ../JUCE

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_DIR=../JUCE \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build plugin
        run: cmake --build build --parallel --config Release

      - name: Create installer zip
        run: |
          mkdir -p installer

          VST3=$(find build -name "*.vst3" -type d | head -1)
          AU=$(find build -name "*.component" -type d | head -1)

          [ -n "$VST3" ] && cp -r "$VST3" installer/
          [ -n "$AU"   ] && cp -r "$AU"   installer/

          cat > installer/INSTALLA.command << 'INSTALL'
#!/bin/bash
DIR="$(cd "$(dirname "$0")" && pwd)"
mkdir -p "$HOME/Library/Audio/Plug-Ins/VST3"
mkdir -p "$HOME/Library/Audio/Plug-Ins/Components"

VST3=$(find "$DIR" -name "*.vst3" -maxdepth 1 | head -1)
AU=$(find "$DIR"  -name "*.component" -maxdepth 1 | head -1)

[ -n "$VST3" ] && cp -r "$VST3" "$HOME/Library/Audio/Plug-Ins/VST3/"  && echo "✅ VST3 installato!"
[ -n "$AU"   ] && cp -r "$AU"   "$HOME/Library/Audio/Plug-Ins/Components/" && echo "✅ Audio Unit installato!"

echo ""
echo "🎤 VocalOne installato! Riavvia il tuo DAW."
echo "Premi INVIO per chiudere..."
read
INSTALL
          chmod +x installer/INSTALLA.command

          cd installer && zip -r ../VocalOne-macOS-1.0.0.zip . && cd ..
          echo "=== ZIP ===" && ls -lh VocalOne-macOS-1.0.0.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "VocalOne v1.0.0 — One Plugin. Every Vocal."
          body: |
            ## 🎤 VocalOne v1.0.0

            **Come installare:**
            1. Scarica `VocalOne-macOS-1.0.0.zip`
            2. Decomprimi
            3. Doppio click su `INSTALLA.command`
            4. Riavvia il DAW

            **Compatibile con:** Logic Pro · Ableton · Pro Tools · Reaper · FL Studio
            **Architetture:** Apple Silicon M1/M2/M3/M4 + Intel (Universal Binary)
          files: VocalOne-macOS-1.0.0.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
